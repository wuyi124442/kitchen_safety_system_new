{% extends 'base.html' %}

{% block title %}实时日志监控 - 厨房安全检测系统{% endblock %}

{% block extra_css %}
<style>
    .log-entry {
        border-left: 4px solid #dee2e6;
        padding: 10px;
        margin-bottom: 5px;
        background-color: #f8f9fa;
        animation: fadeIn 0.5s ease-in;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .log-entry.DEBUG { border-left-color: #6c757d; }
    .log-entry.INFO { border-left-color: #0dcaf0; }
    .log-entry.WARNING { border-left-color: #ffc107; }
    .log-entry.ERROR { border-left-color: #dc3545; }
    .log-entry.CRITICAL { border-left-color: #6f42c1; }
    
    .log-timestamp {
        font-size: 0.85em;
        color: #6c757d;
    }
    
    .log-level {
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 0.75em;
    }
    
    .log-level.DEBUG { background-color: #6c757d; color: white; }
    .log-level.INFO { background-color: #0dcaf0; color: white; }
    .log-level.WARNING { background-color: #ffc107; color: black; }
    .log-level.ERROR { background-color: #dc3545; color: white; }
    .log-level.CRITICAL { background-color: #6f42c1; color: white; }
    
    .monitor-controls {
        background-color: #f8f9fa;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        position: sticky;
        top: 20px;
        z-index: 100;
    }
    
    .log-container {
        max-height: 70vh;
        overflow-y: auto;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 10px;
        background-color: white;
    }
    
    .status-indicator {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        margin-right: 8px;
    }
    
    .status-indicator.connected { background-color: #28a745; }
    .status-indicator.disconnected { background-color: #dc3545; }
    .status-indicator.connecting { background-color: #ffc107; }
</style>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-eye"></i> 实时日志监控</h2>
            <a href="{% url 'logs:log_query' %}" class="btn btn-primary">
                <i class="fas fa-search"></i> 日志查询
            </a>
        </div>
        
        <!-- 监控控制面板 -->
        <div class="monitor-controls">
            <div class="row align-items-center">
                <div class="col-md-2">
                    <div class="d-flex align-items-center">
                        <span id="statusIndicator" class="status-indicator connecting"></span>
                        <span id="statusText">连接中...</span>
                    </div>
                </div>
                <div class="col-md-2">
                    <select class="form-select form-select-sm" id="levelFilter">
                        <option value="">全部级别</option>
                        {% for level_code, level_name in level_choices %}
                        <option value="{{ level_code }}">{{ level_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select form-select-sm" id="typeFilter">
                        <option value="">全部类型</option>
                        {% for type_code, type_name in type_choices %}
                        <option value="{{ type_code }}">{{ type_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2">
                    <button id="pauseBtn" class="btn btn-warning btn-sm">
                        <i class="fas fa-pause"></i> 暂停
                    </button>
                </div>
                <div class="col-md-2">
                    <button id="clearBtn" class="btn btn-danger btn-sm">
                        <i class="fas fa-trash"></i> 清空
                    </button>
                </div>
                <div class="col-md-2">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="autoScroll" checked>
                        <label class="form-check-label" for="autoScroll">自动滚动</label>
                    </div>
                </div>
            </div>
            <div class="row mt-2">
                <div class="col-12">
                    <small class="text-muted">
                        <i class="fas fa-info-circle"></i>
                        实时显示最新日志，最多保留500条记录。
                        最后更新: <span id="lastUpdate">--</span>
                    </small>
                </div>
            </div>
        </div>
        
        <!-- 日志容器 -->
        <div id="logContainer" class="log-container">
            <div class="text-center text-muted">
                <i class="fas fa-spinner fa-spin"></i> 等待日志数据...
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let isMonitoring = true;
let isPaused = false;
let lastLogId = 0;
let maxLogs = 500;
let pollInterval = 2000; // 2秒轮询一次
let pollTimer = null;

// 页面加载完成后开始监控
document.addEventListener('DOMContentLoaded', function() {
    initializeMonitoring();
    setupEventListeners();
});

// 初始化监控
function initializeMonitoring() {
    updateStatus('connecting', '连接中...');
    startPolling();
}

// 设置事件监听器
function setupEventListeners() {
    // 暂停/恢复按钮
    document.getElementById('pauseBtn').addEventListener('click', function() {
        if (isPaused) {
            resumeMonitoring();
        } else {
            pauseMonitoring();
        }
    });
    
    // 清空按钮
    document.getElementById('clearBtn').addEventListener('click', function() {
        clearLogs();
    });
    
    // 过滤器变化
    document.getElementById('levelFilter').addEventListener('change', function() {
        if (!isPaused) {
            fetchLogs();
        }
    });
    
    document.getElementById('typeFilter').addEventListener('change', function() {
        if (!isPaused) {
            fetchLogs();
        }
    });
}

// 开始轮询
function startPolling() {
    if (pollTimer) {
        clearInterval(pollTimer);
    }
    
    fetchLogs(); // 立即获取一次
    
    pollTimer = setInterval(function() {
        if (!isPaused) {
            fetchLogs();
        }
    }, pollInterval);
}

// 获取日志
function fetchLogs() {
    const params = new URLSearchParams();
    params.append('last_id', lastLogId);
    
    const level = document.getElementById('levelFilter').value;
    const logType = document.getElementById('typeFilter').value;
    
    if (level) params.append('level', level);
    if (logType) params.append('log_type', logType);
    
    fetch(`/logs/api/logs/realtime/?${params.toString()}`)
        .then(response => response.json())
        .then(data => {
            if (data.logs && data.logs.length > 0) {
                appendLogs(data.logs);
                lastLogId = data.last_id;
            }
            
            updateStatus('connected', '已连接');
            updateLastUpdateTime(data.timestamp);
        })
        .catch(error => {
            console.error('Error fetching logs:', error);
            updateStatus('disconnected', '连接失败');
        });
}

// 添加日志到界面
function appendLogs(logs) {
    const container = document.getElementById('logContainer');
    
    // 如果是第一次加载，清空等待消息
    if (container.children.length === 1 && container.children[0].classList.contains('text-center')) {
        container.innerHTML = '';
    }
    
    logs.forEach(log => {
        const logElement = createLogElement(log);
        container.appendChild(logElement);
    });
    
    // 限制日志数量
    while (container.children.length > maxLogs) {
        container.removeChild(container.firstChild);
    }
    
    // 自动滚动到底部
    if (document.getElementById('autoScroll').checked) {
        container.scrollTop = container.scrollHeight;
    }
}

// 创建日志元素
function createLogElement(log) {
    const div = document.createElement('div');
    div.className = `log-entry ${log.level}`;
    
    div.innerHTML = `
        <div class="d-flex justify-content-between align-items-start">
            <div class="flex-grow-1">
                <div class="d-flex align-items-center mb-1">
                    <span class="log-level ${log.level}">${log.level}</span>
                    <span class="badge bg-secondary ms-2">${getLogTypeDisplay(log.log_type)}</span>
                    <span class="log-timestamp ms-2">${formatDateTime(log.timestamp)}</span>
                </div>
                <div class="log-message">${escapeHtml(log.message)}</div>
                ${log.module ? `<small class="text-muted">模块: ${log.module}</small>` : ''}
                ${log.function ? `<small class="text-muted ms-2">函数: ${log.function}</small>` : ''}
            </div>
        </div>
    `;
    
    return div;
}

// 暂停监控
function pauseMonitoring() {
    isPaused = true;
    const btn = document.getElementById('pauseBtn');
    btn.innerHTML = '<i class="fas fa-play"></i> 恢复';
    btn.className = 'btn btn-success btn-sm';
    updateStatus('disconnected', '已暂停');
}

// 恢复监控
function resumeMonitoring() {
    isPaused = false;
    const btn = document.getElementById('pauseBtn');
    btn.innerHTML = '<i class="fas fa-pause"></i> 暂停';
    btn.className = 'btn btn-warning btn-sm';
    updateStatus('connecting', '恢复中...');
    fetchLogs();
}

// 清空日志
function clearLogs() {
    document.getElementById('logContainer').innerHTML = '';
    lastLogId = 0;
}

// 更新状态
function updateStatus(status, text) {
    const indicator = document.getElementById('statusIndicator');
    const statusText = document.getElementById('statusText');
    
    indicator.className = `status-indicator ${status}`;
    statusText.textContent = text;
}

// 更新最后更新时间
function updateLastUpdateTime(timestamp) {
    const lastUpdate = document.getElementById('lastUpdate');
    lastUpdate.textContent = formatDateTime(timestamp);
}

// 工具函数
function formatDateTime(dateString) {
    return new Date(dateString).toLocaleString('zh-CN');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getLogTypeDisplay(type) {
    const typeMap = {
        'SYSTEM': '系统日志',
        'DETECTION': '检测日志',
        'ALERT': '报警日志',
        'USER': '用户操作日志',
        'ERROR': '错误日志'
    };
    return typeMap[type] || type;
}

// 页面卸载时清理定时器
window.addEventListener('beforeunload', function() {
    if (pollTimer) {
        clearInterval(pollTimer);
    }
});
</script>
{% endblock %}
